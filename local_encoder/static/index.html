<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Encoder</title>
<script src="/static/vendor/tailwind.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: { colors: { brand: { DEFAULT: '#4a7cff', dark: '#2d5ce0' } } } }
  }
</script>
<script src="/static/vendor/react.development.js" crossorigin></script>
<script src="/static/vendor/react-dom.development.js" crossorigin></script>
<script src="/static/vendor/babel.min.js"></script>
<style>
  body { background: #0f1117; }
  .log-scroll::-webkit-scrollbar { width: 6px; }
  .log-scroll::-webkit-scrollbar-track { background: transparent; }
  .log-scroll::-webkit-scrollbar-thumb { background: #334; border-radius: 3px; }
</style>
</head>
<body class="text-slate-200 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const cls = (...a) => a.filter(Boolean).join(' ');

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      return s !== null ? JSON.parse(s) : initial;
    } catch { return initial; }
  });
  const set = useCallback(v => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, set];
}

function Input({ label, type = 'text', value, onChange, placeholder, className = '' }) {
  return (
    <label className="block">
      {label && <span className="text-xs text-slate-400 mb-1 block">{label}</span>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        className={cls('w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100',
          'focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition', className)} />
    </label>
  );
}

function Select({ label, value, onChange, options }) {
  return (
    <label className="block">
      {label && <span className="text-xs text-slate-400 mb-1 block">{label}</span>}
      <select value={value} onChange={e => onChange(e.target.value)}
        className="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-brand transition">
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </label>
  );
}

function Btn({ children, onClick, disabled, variant = 'primary', size = 'md' }) {
  const base = 'rounded-lg font-semibold transition disabled:opacity-40 disabled:cursor-not-allowed';
  const sz = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-6 py-2.5 text-base' }[size];
  const v = { primary: 'bg-brand hover:bg-brand-dark text-white', success: 'bg-emerald-600 hover:bg-emerald-500 text-white', ghost: 'bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200' }[variant];
  return <button onClick={onClick} disabled={disabled} className={cls(base, sz, v)}>{children}</button>;
}

function Card({ children, className = '' }) {
  return <div className={cls('rounded-xl border border-slate-800 bg-slate-900/60 p-5', className)}>{children}</div>;
}

function StepRow({ label, pct, color }) {
  return (
    <div className="flex items-center gap-3">
      <span className="w-20 shrink-0 text-xs text-slate-400">{label}</span>
      <div className="flex-1 h-1.5 rounded-full bg-slate-800 overflow-hidden">
        <div className={cls('h-full rounded-full transition-all duration-300', color)} style={{ width: pct + '%' }} />
      </div>
      <span className="w-8 text-right text-xs text-slate-500">{pct}%</span>
    </div>
  );
}

function Badge({ ok, text }) {
  if (text === null) return null;
  return <span className={cls('inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-bold', ok ? 'bg-emerald-900/60 text-emerald-400' : 'bg-red-900/60 text-red-400')}>{ok ? '✓' : '✗'} {text}</span>;
}

const ICONS = {
  server:        () => <><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="18" r="1" fill="currentColor" stroke="none"/></>,
  film:          () => <><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></>,
  list:          () => <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
  wifi:          () => <><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/></>,
  link:          () => <><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></>,
  upload:        () => <><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></>,
  folder:        () => <><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></>,
  plus:          () => <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  alert:         () => <><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
  check:         () => <><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
  xcircle:       () => <><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>,
  clock:         () => <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
  loader:        () => <path d="M21 12a9 9 0 11-6.219-8.56"/>,
  extlink:       () => <><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>,
  tv:            () => <><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></>,
  timer:         () => <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
  hdd:           () => <><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></>,
};
function Ico({ name, size = 14, className = '' }) {
  const Content = ICONS[name];
  return Content ? (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
         className={cls('inline-block shrink-0', className)} aria-hidden="true">
      <Content />
    </svg>
  ) : null;
}

function LogScroll({ logs }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [logs]);
  return (
    <div ref={ref} className="log-scroll bg-slate-950 rounded-lg p-3 h-36 overflow-y-auto font-mono text-xs text-slate-400 space-y-0.5">
      {logs.map((l, i) => <div key={i}>{l}</div>)}
    </div>
  );
}

const TABS = ['URL', 'File Upload'];

function App() {
  const [serverUrl, setServerUrl] = useLocalStorage('ave_server_url', '');
  const [username, setUsername]   = useLocalStorage('ave_username', '');
  const [password, setPassword]   = useLocalStorage('ave_password', '');
  const [sslVerify, setSslVerify] = useLocalStorage('ave_ssl_verify', true);
  const [connStatus, setConnStatus] = useState(null);
  const [testing, setTesting] = useState(false);
  const [categories, setCategories] = useState([]);
  const [catsLoaded, setCatsLoaded] = useState(false);

  const [tab, setTab]             = useLocalStorage('ave_tab', 'URL');
  const [videoUrl, setVideoUrl]   = useState('');
  const [localFile, setLocalFile] = useState(null);
  const [vidTitle, setVidTitle]   = useState('');
  const [vidDesc, setVidDesc]     = useState('');
  // Category key is scoped to server+user so each site remembers its own last category
  const catKey = `ave_cat_id::${serverUrl}::${username}`;
  const [catId, setCatId]         = useLocalStorage(catKey, '0');
  const [format, setFormat]       = useLocalStorage('ave_format', 'auto');
  // resolutions: stored as JSON-encoded int array, e.g. [360, 720]
  const [resolutionsRaw, setResolutionsRaw] = useLocalStorage('ave_resolutions', '[]');
  const resolutions = (() => { try { return JSON.parse(resolutionsRaw); } catch { return []; } })();
  const setResolutions = arr => setResolutionsRaw(JSON.stringify(arr));
  function toggleResolution(r) {
    setResolutions(resolutions.includes(r) ? resolutions.filter(x => x !== r) : [...resolutions, r].sort((a,b)=>a-b));
  }


  // Job queue state: array of { job_id, status, title, thumbnail, pct, logs, doneInfo, jobError, videoInfo }
  const [jobQueue, setJobQueue] = useState([]);
  const openSseRefs = useRef({});  // job_id -> EventSource

  function updateJob(job_id, patch) {
    setJobQueue(prev => prev.map(j => j.job_id === job_id ? { ...j, ...patch } : j));
  }

  function openSseForJob(job_id) {
    if (openSseRefs.current[job_id]) return;
    const es = new EventSource(`/api/import/${job_id}/progress`);
    openSseRefs.current[job_id] = es;
    const appendJobLog = msg => {
      const now = new Date().toLocaleTimeString();
      setJobQueue(prev => prev.map(j => j.job_id === job_id
        ? { ...j, logs: [...(j.logs || []), `[${now}] ${msg}`] } : j));
    };
    es.addEventListener('log', e => appendJobLog(JSON.parse(e.data).msg));
    es.addEventListener('info', e => {
      const d = JSON.parse(e.data);
      setJobQueue(prev => prev.map(j => j.job_id === job_id
        ? { ...j, videoInfo: { ...(j.videoInfo || {}), ...d }, title: d.title || j.title, thumbnail: d.thumbnail || j.thumbnail }
        : j));
    });
    es.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      setJobQueue(prev => prev.map(j => j.job_id === job_id
        ? { ...j, pct: { ...(j.pct || {}), [d.step]: d.pct } } : j));
      appendJobLog(d.msg);
    });
    es.addEventListener('done', e => {
      const d = JSON.parse(e.data);
      updateJob(job_id, { status: 'done', doneInfo: d, pct: { download: 100, encode: 100, upload: 100 } });
      es.close(); delete openSseRefs.current[job_id];
    });
    es.addEventListener('error', e => {
      if (e.data) updateJob(job_id, { status: 'error', jobError: JSON.parse(e.data).msg });
      es.close(); delete openSseRefs.current[job_id];
    });
    es.onerror = () => { es.close(); delete openSseRefs.current[job_id]; };
  }

  // Poll /api/jobs every 2s to pick up status changes (pending → running) and reconnect SSE
  useEffect(() => {
    const poll = setInterval(async () => {
      try {
        const res = await fetch('/api/jobs');
        if (!res.ok) return;
        const jobs = await res.json();
        // Update status of existing items in queue
        setJobQueue(prev => prev.map(j => {
          const srv = jobs.find(x => x.job_id === j.job_id);
          if (!srv) return j;
          const updated = { ...j, status: srv.status };
          if (srv.title && !j.title) updated.title = srv.title;
          return updated;
        }));
        // Open SSE for any job that is now running and doesn't have an open SSE
        jobs.filter(j => j.status === 'running').forEach(j => openSseForJob(j.job_id));
      } catch (_) {}
    }, 2000);
    return () => clearInterval(poll);
  }, []);

  // Auto-test connection on mount if credentials are already saved
  useEffect(() => {
    if (serverUrl && username) testConnection();
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  async function testConnection() {
    setTesting(true); setConnStatus(null); setCatsLoaded(false); setCategories([]);
    try {
      const res = await fetch('/api/test-connection', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ server_url: serverUrl, username, password, ssl_verify: sslVerify }),
      });
      const data = await res.json();
      if (data.ok) {
        setConnStatus({ ok: true, text: data.name || 'Connected', logoUrl: data.logo_url || null });
        fetchCategories();
      } else {
        setConnStatus({ ok: false, text: data.error || 'Failed' });
      }
    } catch (e) { setConnStatus({ ok: false, text: 'Network error' }); }
    finally { setTesting(false); }
  }

  async function fetchCategories() {
    const p = new URLSearchParams({ server_url: serverUrl, username, password, ssl_verify: sslVerify });
    try {
      const res = await fetch('/api/categories?' + p);
      if (!res.ok) throw new Error(await res.text());
      const cats = await res.json();
      setCategories(cats);
      if (cats.length > 0) {
        // Keep the saved category if it still exists on this server, else fall back to first
        const saved = localStorage.getItem(catKey);
        const savedId = saved ? JSON.parse(saved) : null;
        const exists = cats.some(c => String(c.id) === String(savedId));
        if (!exists) setCatId(String(cats[0].id));
      }
    } catch (e) { /* silently ignore, form still works */ }
    finally { setCatsLoaded(true); }
  }

  async function startImport() {
    let res;
    try {
      if (tab === 'URL') {
        res = await fetch('/api/import', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: videoUrl, server_url: serverUrl, username, password, ssl_verify: sslVerify,
            categories_id: parseInt(catId) || 0, title: vidTitle, description: vidDesc,
            format, resolutions }),
        });
      } else {
        const fd = new FormData();
        fd.append('file', localFile);
        [['server_url', serverUrl],['username', username],['password', password],
         ['ssl_verify', sslVerify],['categories_id', catId],['title', vidTitle],
         ['description', vidDesc],['format', format],['resolution', resolutions.join(',')]
        ].forEach(([k,v]) => fd.append(k, v));
        res = await fetch('/api/import-file', { method: 'POST', body: fd });
      }
      const data = await res.json();
      const jid = data.job_id;
      const label = vidTitle || (tab === 'URL' ? videoUrl : localFile?.name) || jid;
      // Add to local queue state immediately
      setJobQueue(prev => [...prev, {
        job_id: jid, status: 'pending', title: label.slice(0, 80),
        thumbnail: '', pct: { download: 0, encode: 0, upload: 0 },
        logs: [], doneInfo: null, jobError: null, videoInfo: null,
      }]);
      // Reset form input but keep settings
      if (tab === 'URL') setVideoUrl('');
      else setLocalFile(null);
      setVidTitle(''); setVidDesc('');
    } catch (e) { alert('Submit error: ' + e.message); }
  }

  const connOk = connStatus?.ok === true;
  const canImport = connOk && (tab === 'URL' ? videoUrl.trim() : !!localFile);

  const catOptions = [
    { value: '0', label: '— none —' },
    ...categories.map(c => ({ value: String(c.id), label: c.name })),
  ];

  return (
    <div className="mx-auto max-w-2xl px-4 py-10 space-y-5">
      {/* Logo area — always reserves space (500×140 px aspect ratio) to prevent layout shift */}
      <div className="flex justify-center py-2">
        <div style={{ width: 250, height: 70 }} className="flex items-center justify-center">
          {connStatus?.ok && connStatus.logoUrl
            ? <img
                src={connStatus.logoUrl}
                alt="Site logo"
                width={250} height={70}
                className="object-contain"
                style={{ filter: 'drop-shadow(0 0 4px rgba(0,0,0,0.85)) drop-shadow(0 0 2px rgba(255,255,255,0.7))' }}
                onError={e => { e.currentTarget.style.visibility = 'hidden'; }}
              />
            : <div className="w-full h-full rounded-lg bg-slate-800/40" />
          }
        </div>
      </div>
      
      <Card>
        <h2 className="text-sm font-semibold text-slate-300 mb-4 flex items-center gap-2"><Ico name="server" className="text-brand" />AVideo Server</h2>
        <div className="space-y-3">
          <Input label="Server URL" type="url" value={serverUrl} onChange={setServerUrl} placeholder="https://your-avideo.example.com/" />
          <div className="grid grid-cols-2 gap-3">
            <Input label="Username" value={username} onChange={setUsername} placeholder="admin" />
            <Input label="Password" type="password" value={password} onChange={setPassword} placeholder="••••••" />
          </div>
          <label className="flex items-center gap-2 text-xs text-slate-400 cursor-pointer select-none">
            <input type="checkbox" checked={sslVerify} onChange={e => setSslVerify(e.target.checked)} className="accent-brand" />
            Verify SSL certificate
          </label>
          <div className="flex items-center gap-3 pt-1">
            <Btn onClick={testConnection} disabled={testing || !serverUrl || !username} size="sm">
              <span className="inline-flex items-center gap-1.5"><Ico name="wifi" />{testing ? 'Testing…' : 'Test Connection'}</span>
            </Btn>
            {connStatus && <Badge ok={connStatus.ok} text={connStatus.text} />}
          </div>
        </div>
      </Card>

      <Card>
        <h2 className="text-sm font-semibold text-slate-300 mb-4 flex items-center gap-2"><Ico name="film" className="text-brand" />Import Video</h2>
        <div className="flex gap-1 mb-4 rounded-lg bg-slate-800/60 p-1 w-fit">
          {TABS.map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={cls('inline-flex items-center gap-1.5 rounded-md px-4 py-1.5 text-xs font-semibold transition',
                tab === t ? 'bg-brand text-white shadow' : 'text-slate-400 hover:text-slate-200')}>
              {t === 'URL' ? <Ico name="link" size={12} /> : <Ico name="upload" size={12} />}{t}
            </button>
          ))}
        </div>
        <div className="space-y-3">
          {tab === 'URL' ? (
            <Input label="Video URL" type="url" value={videoUrl} onChange={setVideoUrl} placeholder="https://www.youtube.com/watch?v=…" />
          ) : (
            <label className="block">
              <span className="text-xs text-slate-400 mb-1 block">Local video file</span>
              <div onClick={() => document.getElementById('file-input').click()}
                className={cls('flex flex-col items-center justify-center gap-2 rounded-lg border-2 border-dashed cursor-pointer py-8 text-sm transition',
                  localFile ? 'border-emerald-600 text-emerald-400 bg-emerald-950/20' : 'border-slate-700 text-slate-400 hover:border-brand bg-slate-900')}>
                {localFile ? (
                  <><Ico name="film" size={28} className="text-emerald-400" /><span className="font-medium">{localFile.name}</span><span className="text-xs text-slate-500">{(localFile.size/1048576).toFixed(1)} MiB</span></>
                ) : (
                  <><Ico name="folder" size={28} className="text-slate-500" /><span>Click to select a video file</span><span className="text-xs text-slate-500">MP4, MKV, MOV, AVI, WebM…</span></>
                )}
              </div>
              <input id="file-input" type="file" accept="video/*,.mkv,.avi,.mov,.flv,.webm,.mp4" className="hidden"
                onChange={e => { const f = e.target.files?.[0]; if (f) { setLocalFile(f); if (!vidTitle) setVidTitle(f.name.replace(/\.[^.]+$/,'')); } }} />
            </label>
          )}
          <Input label="Title (optional)" value={vidTitle} onChange={setVidTitle} placeholder="Auto-detected from URL / filename" />
          <label className="block">
            <span className="text-xs text-slate-400 mb-1 block">Description (optional)</span>
            <textarea value={vidDesc} onChange={e => setVidDesc(e.target.value)} placeholder="Optional description…" rows={2}
              className="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition resize-none" />
          </label>
          <div className="grid grid-cols-2 gap-3">
            <Select label="Category" value={catId} onChange={setCatId}
              options={catsLoaded ? catOptions : [{ value: '0', label: connOk ? 'Loading\u2026' : '\u2014 connect first \u2014' }]} />
            <Select label="Format" value={format} onChange={setFormat}
              options={[{ value:'auto',label:'Auto'},{ value:'mp4',label:'MP4'},{ value:'hls',label:'HLS'}]} />
          </div>
          <div>
            <div className="flex items-baseline gap-2 mb-2">
              <span className="text-xs text-slate-400">Resolutions</span>
              {resolutions.length === 0
                ? <span className="text-xs text-slate-500">— all available resolutions will be encoded</span>
                : <span className="text-xs text-brand font-semibold">will encode: {resolutions.map(r => r >= 2160 ? '4K' : r+'p').join(', ')}</span>
              }
            </div>
            <div className="flex flex-wrap gap-2">
              {[240,360,480,540,720,1080,1440,2160].map(r => (
                <label key={r} className={cls(
                  'flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-semibold cursor-pointer border transition select-none',
                  resolutions.includes(r)
                    ? 'bg-brand/20 border-brand text-brand'
                    : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500'
                )}>
                  <input type="checkbox" className="hidden" checked={resolutions.includes(r)} onChange={() => toggleResolution(r)} />
                  {r >= 2160 ? '4K' : r+'p'}
                </label>
              ))}
            </div>
          </div>
          {!connOk && <p className="inline-flex items-center gap-1.5 text-xs text-amber-400"><Ico name="alert" className="text-amber-400" size={13} />Test the server connection before importing.</p>}
          <div className="pt-1">
            <Btn variant="success" onClick={startImport} disabled={!canImport}>
              <span className="inline-flex items-center gap-1.5"><Ico name="plus" />Add to Queue</span>
            </Btn>
          </div>
        </div>
      </Card>

      {jobQueue.length > 0 && (
        <Card>
          <h2 className="text-sm font-semibold text-slate-300 mb-4 flex items-center gap-2"><Ico name="list" className="text-brand" />Queue <span className="text-slate-500 font-normal">({jobQueue.length})</span></h2>
          <div className="space-y-4">
            {jobQueue.map((job, idx) => {
              const pct = job.pct || { download: 0, encode: 0, upload: 0 };
              const statusIcon =
                job.status === 'pending' ? <span className="text-slate-500 text-xs font-bold">#{idx+1}</span>
                : job.status === 'running' ? <Ico name="loader" size={14} className="text-amber-400 animate-spin" />
                : job.status === 'done'    ? <Ico name="check" size={14} className="text-emerald-400" />
                : <Ico name="xcircle" size={14} className="text-red-400" />;
              const statusColor = job.status === 'done' ? 'text-emerald-400'
                : job.status === 'error' ? 'text-red-400'
                : job.status === 'running' ? 'text-amber-400'
                : 'text-slate-500';
              return (
                <div key={job.job_id} className="rounded-lg border border-slate-700 bg-slate-800/40 p-3 space-y-2">
                  {/* Header row */}
                  <div className="flex items-start gap-2">
                    <span className="mt-0.5 shrink-0 w-5 flex justify-center">{statusIcon}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-medium text-slate-100 truncate">{job.title || job.job_id}</p>
                      <span className={cls('text-xs capitalize', statusColor)}>{job.status}</span>
                    </div>
                    {job.thumbnail && (
                      <img src={job.thumbnail} alt="" className="w-14 h-10 rounded object-cover shrink-0 bg-slate-700" />
                    )}
                  </div>

                  {job.videoInfo && (job.status === 'running' || job.status === 'done') && (
                    <div className="flex flex-wrap gap-x-4 gap-y-0.5 text-xs text-slate-400 pl-7">
                      {job.videoInfo.uploader && <span className="inline-flex items-center gap-1"><Ico name="tv" size={11} />{job.videoInfo.uploader}</span>}
                      {job.videoInfo.duration_s > 0 && (
                        <span className="inline-flex items-center gap-1"><Ico name="timer" size={11} />{Math.floor(job.videoInfo.duration_s/3600) > 0 ? `${Math.floor(job.videoInfo.duration_s/3600)}h ` : ''}{Math.floor((job.videoInfo.duration_s%3600)/60)}m {job.videoInfo.duration_s%60}s</span>
                      )}
                      {job.videoInfo.file_size_bytes > 0 && (
                        <span className="inline-flex items-center gap-1"><Ico name="hdd" size={11} />{job.videoInfo.file_size_bytes >= 1_073_741_824
                          ? (job.videoInfo.file_size_bytes/1_073_741_824).toFixed(2)+' GiB'
                          : (job.videoInfo.file_size_bytes/1_048_576).toFixed(1)+' MiB'}</span>
                      )}
                    </div>
                  )}

                  {/* Progress bars (running only) */}
                  {job.status === 'running' && (
                    <div className="space-y-1.5 pl-8">
                      <StepRow label="Download" pct={pct.download} color="bg-brand" />
                      <StepRow label="Encode"   pct={pct.encode}   color="bg-amber-500" />
                      <StepRow label="Upload"   pct={pct.upload}   color="bg-emerald-500" />
                    </div>
                  )}

                  {/* Log (running) */}
                  {job.status === 'running' && job.logs && job.logs.length > 0 && (
                    <LogScroll logs={job.logs} />
                  )}

                  {/* Done banner */}
                  {job.status === 'done' && job.doneInfo && (
                    <div className="pl-7 text-xs text-emerald-400 inline-flex items-center gap-1.5">
                      <Ico name="check" size={12} />videos_id: <strong>{job.doneInfo.videos_id}</strong>{' '}
                      <a href={job.doneInfo.url} target="_blank" rel="noreferrer"
                         className="inline-flex items-center gap-1 underline hover:text-emerald-300">
                        View <Ico name="extlink" size={11} />
                      </a>
                    </div>
                  )}

                  {/* Error banner */}
                  {job.status === 'error' && job.jobError && (
                    <div className="pl-7 text-xs text-red-400 inline-flex items-center gap-1.5">
                      <Ico name="xcircle" size={12} />{job.jobError}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
